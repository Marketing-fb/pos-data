<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Dashboard Pro - CH Management</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root {
      --primary: #3b82f6;
      --dark: #0f172a;
      --soft-bg: #f1f5f9;
      --accent: #6366f1;
    }

    body {
      font-family: 'Kanit', sans-serif;
      background-color: var(--soft-bg);
      margin: 0;
      color: var(--dark);
    }

    /* --- Login Screen --- */
    #loginPage {
      background: var(--dark);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 2000;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 30px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .login-logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 4px solid #f1f5f9;
    }

    /* --- Dashboard Header --- */
    .top-nav {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-img { width: 40px; border-radius: 8px; }

    /* --- Content Cards --- */
    .main-content { padding: 25px; max-width: 1400px; margin: auto; }
    
    .cust-card {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border-radius: 25px;
      padding: 30px;
      border: none;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
    }
    .cust-card .form-control {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 12px;
    }
    .cust-card .form-control::placeholder { color: rgba(255,255,255,0.5); }
    .cust-card .form-control:focus { background: rgba(255,255,255,0.25); color: white; border-color: white; box-shadow: none; }

    .order-card {
      background: #eff6ff;
      border: 1px solid #dbeafe;
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .order-card h5 { color: #1e40af; font-weight: 600; }

    .btn-main {
      background: #10b981;
      color: white;
      border: none;
      border-radius: 15px;
      padding: 18px;
      font-weight: 600;
      width: 100%;
      transition: all 0.3s;
      font-size: 1.1rem;
      box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
    }
    .btn-main:hover { transform: translateY(-3px); background: #059669; }

    /* --- UI Components --- */
    #loader {
      display: none;
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background:rgba(255,255,255,0.8);
      z-index:9999;
      justify-content:center;
      align-items:center;
    }
    .search-group { background: #f1f5f9; border-radius: 15px; padding: 5px; display: flex; width: 100%; max-width: 500px; }
    .btn-action { border-radius: 10px; font-weight: 600; }
  </style>
</head>
<body>

<div id="loader"><div class="spinner-border text-primary" role="status"></div></div>

<div id="loginPage">
  <div class="login-box">
    <img src="https://i.postimg.cc/jjFG7ZmX/463627704-946416417505448-1269396498497011830-n.jpg" class="login-logo">
    <h3 class="fw-bold">CH-MANAGEMENT</h3>
    <p class="text-muted small mb-4">เข้าสู่ระบบ Dashboard</p>
    <input type="password" id="passInput" class="form-control text-center mb-3 py-3" placeholder="••••" maxlength="4" style="font-size: 2rem; letter-spacing: 12px; border-radius: 15px;" onkeypress="if(event.key==='Enter')login()">
    <button class="btn btn-primary w-100 py-3 rounded-4 fw-bold shadow-lg" onclick="login()">ตกลง</button>
  </div>
</div>

<div id="mainPage" style="display:none;">
  <div class="top-nav">
    <div class="d-flex align-items-center">
      <img src="https://i.postimg.cc/jjFG7ZmX/463627704-946416417505448-1269396498497011830-n.jpg" class="logo-img">
      <span class="ms-3 fw-bold fs-5 d-none d-md-inline">SALES MANAGEMENT</span>
    </div>
    <div class="d-flex align-items-center gap-2 w-100 justify-content-end">
      <div class="search-group shadow-sm">
        <input type="text" id="searchInput" class="form-control border-0 bg-transparent" placeholder="ค้นหา ชื่อ / เบอร์โทร..." onkeypress="if(event.key==='Enter')searchCust()">
        <button class="btn btn-dark btn-action px-3 mx-1" onclick="searchCust()">ค้นหา</button>
        <button class="btn btn-outline-secondary btn-action" onclick="clearAllForm()"><i class="fa-solid fa-eraser"></i> ล้าง</button>
      </div>
      <button class="btn btn-outline-danger btn-action border-0 ms-2" onclick="location.reload()"><i class="fa-solid fa-power-off"></i></button>
    </div>
  </div>

  <div class="main-content">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="cust-card h-100">
          <h5 class="fw-bold mb-4"><i class="fa-solid fa-id-card me-2"></i> ข้อมูลลูกค้า</h5>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="small opacity-75">รหัสลูกค้า</label>
              <input type="text" id="c_id" class="form-control fw-bold text-center" readonly>
            </div>
            <div class="col-6">
              <label class="small opacity-75">ซื้อล่าสุดเมื่อ</label>
              <input type="text" id="c_last_date" class="form-control text-center" readonly placeholder="-">
            </div>
          </div>
          <div class="mb-3">
            <label class="small opacity-75">ชื่อ-นามสกุล</label>
            <input type="text" id="c_name" class="form-control" placeholder="ชื่อลูกค้า">
          </div>
          <div class="mb-3">
            <label class="small opacity-75">เบอร์โทรศัพท์</label>
            <input type="text" id="c_phone" class="form-control" placeholder="08x-xxx-xxxx">
          </div>
          <div class="mb-0">
            <label class="small opacity-75">ที่อยู่จัดส่ง</label>
            <textarea id="c_address" class="form-control" rows="6" placeholder="ระบุที่อยู่จัดส่งสินค้า..."></textarea>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="order-card h-100">
          <h5 class="fw-bold mb-4"><i class="fa-solid fa-cart-plus me-2"></i> รายละเอียดการขาย</h5>
          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <label class="form-label">วันที่สั่งซื้อ</label>
              <input type="date" id="o_date" class="form-control">
            </div>
            <div class="col-md-4">
              <label class="form-label">เลขที่ใบสั่งซื้อ (Auto)</label>
              <input type="text" id="o_id" class="form-control bg-white fw-bold" readonly>
            </div>
            <div class="col-md-4">
              <label class="form-label">รายการสินค้า</label>
              <input type="text" id="o_item" class="form-control" placeholder="สินค้าที่สั่ง">
            </div>
          </div>
          
          <div class="row g-3 mb-4 text-center">
            <div class="col-4">
              <label class="form-label">ต้นทุน (บาท)</label>
              <input type="number" id="o_cost" class="form-control text-danger fw-bold" value="0">
            </div>
            <div class="col-4">
              <label class="form-label">ราคาขาย (บาท)</label>
              <input type="number" id="o_price" class="form-control text-success fw-bold" value="0">
            </div>
            <div class="col-4">
              <label class="form-label">จำนวน</label>
              <input type="number" id="o_qty" class="form-control text-center" value="1">
            </div>
          </div>

          <div class="row g-3 mb-5">
            <div class="col-6">
              <label class="form-label">ค่าจัดส่ง</label>
              <input type="number" id="o_ship" class="form-control" value="0">
            </div>
            <div class="col-6">
              <label class="form-label">ส่วนลด</label>
              <input type="number" id="o_disc" class="form-control text-primary" value="0">
            </div>
          </div>

          <button class="btn-main" onclick="submitAll()">
            <i class="fa-solid fa-cloud-arrow-up me-2"></i> บันทึกรายการขายและลูกค้าทั้งหมด
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // 🌟 [สำคัญ] วาง URL ของ Google Apps Script ที่นี่
  const API_URL = "https://script.google.com/macros/s/AKfycbzNA8jDf6IxoaN-zQTWKp4Oh7zufGPUh4nPZNC6NVpfDEanWJA77wWQXBbkvE_vMnZWgw/exec";

  let logoutTimer;
  const showL = () => document.getElementById('loader').style.display = 'flex';
  const hideL = () => document.getElementById('loader').style.display = 'none';

  // ระบบ API Wrapper
  async function callBackend(action, data = null, query = null) {
    showL();
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action, data, query })
      });
      const res = await response.json();
      hideL();
      return res;
    } catch (err) {
      hideL();
      Swal.fire('Error', 'ไม่สามารถเชื่อมต่อ Google Sheets ได้', 'error');
      return null;
    }
  }

  // ระบบ Auto Logout (15 นาที)
  function startLogoutTimer() {
    clearTimeout(logoutTimer);
    logoutTimer = setTimeout(() => {
      Swal.fire('Session Timeout', 'ไม่ได้ใช้งานนานเกินไป กรุณาล็อกอินใหม่', 'info').then(() => location.reload());
    }, 900000); 
  }

  function setDefaultDate() {
    const now = new Date();
    document.getElementById('o_date').value = now.toISOString().split('T')[0];
  }

  async function login() {
    const pass = document.getElementById('passInput').value;
    const res = await callBackend("login", null, null, pass); // ปรับนิดหน่อยใน Code.gs ให้รับ pass ตรงๆ ได้
    // เพื่อความง่ายในที่นี้ผมจะส่งผ่าน JSON body
    const check = await callBackend("login", { pass: pass });
    
    if(check) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainPage').style.display = 'block';
      setDefaultDate();
      updateIds();
      startLogoutTimer();
      window.onclick = startLogoutTimer;
      window.onmousemove = startLogoutTimer;
    } else {
      Swal.fire('รหัสผ่านผิด', 'กรุณาลองใหม่อีกครั้ง', 'error');
    }
  }

  async function updateIds() {
    const res = await callBackend("getNextIds");
    if(res) {
      document.getElementById('c_id').value = res.custId;
      document.getElementById('o_id').value = res.orderId;
    }
  }

  async function searchCust() {
    const q = document.getElementById('searchInput').value;
    if(!q) return;
    const res = await callBackend("search", null, q);
    if(res) {
      document.getElementById('c_id').value = res.id;
      document.getElementById('c_name').value = res.name;
      document.getElementById('c_phone').value = res.phone;
      document.getElementById('c_address').value = res.address;
      document.getElementById('c_last_date').value = res.lastDate;
      
      Swal.fire({
        title: '<span style="color:#6366f1">พบประวัติลูกค้า</span>',
        html: `
          <div class="text-start p-2" style="font-size:0.9rem">
            <b>👤 ชื่อ:</b> ${res.name} <br>
            <b>📅 ซื้อล่าสุด:</b> ${res.lastDate} <br>
            <b>💰 ยอดสะสม:</b> <span class="text-success">฿${res.totalSpent.toLocaleString()}</span> <br>
            <b>📦 จำนวน:</b> ${res.orderCount} ครั้ง
          </div>`,
        icon: 'success'
      });
    } else {
      Swal.fire('ไม่พบข้อมูล', 'ไม่พบชื่อหรือเบอร์โทรนี้', 'warning');
    }
  }

  function clearAllForm() {
    document.querySelectorAll('input:not([readonly])').forEach(i => i.value = "");
    document.getElementById('c_address').value = "";
    document.getElementById('o_cost').value = 0;
    document.getElementById('o_price').value = 0;
    document.getElementById('o_qty').value = 1;
    document.getElementById('o_ship').value = 0;
    document.getElementById('o_disc').value = 0;
    setDefaultDate();
    updateIds();
  }

  async function submitAll() {
    const data = {
      id: document.getElementById('c_id').value,
      name: document.getElementById('c_name').value,
      phone: document.getElementById('c_phone').value,
      address: document.getElementById('c_address').value,
      orderDate: document.getElementById('o_date').value,
      orderId: document.getElementById('o_id').value,
      item: document.getElementById('o_item').value,
      cost: Number(document.getElementById('o_cost').value),
      price: Number(document.getElementById('o_price').value),
      qty: Number(document.getElementById('o_qty').value),
      shipping: Number(document.getElementById('o_ship').value),
      discount: Number(document.getElementById('o_disc').value)
    };

    if(!data.name || !data.orderId) return Swal.fire('เตือน', 'กรุณาระบุชื่อและเลขที่ออเดอร์', 'warning');

    const res = await callBackend("save", data);
    if(res) {
      Swal.fire('สำเร็จ!', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success');
      document.getElementById('o_item').value = "";
      document.getElementById('o_cost').value = 0;
      document.getElementById('o_price').value = 0;
      document.getElementById('o_qty').value = 1;
      document.getElementById('o_ship').value = 0;
      document.getElementById('o_disc').value = 0;
      updateIds();
    }
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
