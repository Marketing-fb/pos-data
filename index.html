<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales & BI Dashboard - CH Management</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <script src="https://www.chartjs.org/chartjs-chart-financial/chartjs-chart-financial.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root { --primary: #4f46e5; --dark: #0f172a; --soft-bg: #f1f5f9; --card: #ffffff; }
    body { font-family: 'Kanit', sans-serif; background-color: var(--soft-bg); transition: 0.3s; margin: 0; }
    
    .nav-tabs { background: white; padding: 10px 25px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
    .nav-link { border: none !important; color: #64748b; font-weight: 600; border-radius: 12px !important; margin-right: 10px; cursor: pointer; }
    .nav-link.active { background: var(--primary) !important; color: white !important; }

    .report-card { background: var(--card); border: 1px solid #e2e8f0; border-radius: 18px; padding: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); height: 100%; }
    .kpi-label { font-size: 0.75rem; color: #64748b; font-weight: 600; text-transform: uppercase; }
    .kpi-val { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
    .cust-card { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; border-radius: 25px; padding: 25px; border: none; }
    .cust-card .form-control { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; }
    
    #loginPage { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; }
  </style>
</head>
<body>

<div id="loader"><div class="spinner-border text-primary"></div></div>

<div id="loginPage">
  <div class="card p-4 shadow-lg text-center" style="width: 380px; border-radius: 24px;">
    <img src="https://i.postimg.cc/jjFG7ZmX/463627704-946416417505448-1269396498497011830-n.jpg" class="rounded-circle mx-auto mb-3" width="90">
    <h4 class="fw-bold">CH-MANAGEMENT</h4>
    <input type="password" id="passInput" class="form-control text-center my-4 py-3 shadow-sm" placeholder="••••" maxlength="4" style="font-size: 2rem; letter-spacing: 10px; border-radius: 15px;">
    <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="login()">ตกลง</button>
  </div>
</div>

<div id="mainPage" style="display:none;">
  <ul class="nav nav-tabs shadow-sm sticky-top">
    <li class="nav-item"><a class="nav-link active" id="pos-tab" onclick="switchTab('pos')"><i class="fa-solid fa-cash-register me-2"></i>บันทึกยอด</a></li>
    <li class="nav-item"><a class="nav-link" id="bi-tab" onclick="switchTab('bi')"><i class="fa-solid fa-chart-line me-2"></i>สรุปยอด (BI)</a></li>
    <li class="ms-auto"><button onclick="location.reload()" class="btn btn-outline-danger btn-sm rounded-pill px-3 mt-1">ออก</button></li>
  </ul>

  <div class="container-fluid p-4">
    <div id="posSection">
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="cust-card shadow">
            <h5 class="fw-bold mb-4">ข้อมูลลูกค้า</h5>
            <div class="row g-2 mb-3 text-center">
              <div class="col-6"><label class="small opacity-75">ID</label><input type="text" id="c_id" class="form-control fw-bold text-center" readonly></div>
              <div class="col-6"><label class="small opacity-75">ซื้อล่าสุด</label><input type="text" id="c_last_date" class="form-control text-center" readonly placeholder="-"></div>
            </div>
            <input type="text" id="c_name" class="form-control mb-3" placeholder="ชื่อ-นามสกุล">
            <input type="text" id="c_phone" class="form-control mb-3" placeholder="เบอร์โทร">
            <textarea id="c_address" class="form-control mb-3" rows="5" placeholder="ที่อยู่จัดส่ง"></textarea>
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control bg-light" placeholder="ค้นหาชื่อ/เบอร์">
                <button class="btn btn-dark px-3" onclick="searchCust()">ค้นหา</button>
                <button class="btn btn-outline-light text-dark px-3 border" onclick="manualClear()"><i class="fa-solid fa-eraser"></i></button>
            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="report-card">
            <h5 class="fw-bold mb-4 text-primary">รายละเอียดการสั่งซื้อ</h5>
            <div class="row g-3 mb-3">
              <div class="col-md-4"><label class="small">วันที่</label><input type="date" id="o_date" class="form-control bg-white"></div>
              <div class="col-md-4"><label class="small">เลขที่บิล (Auto)</label><input type="text" id="o_id" class="form-control bg-light fw-bold" readonly></div>
              <div class="col-md-4"><label class="small">รายการสินค้า</label><input type="text" id="o_item" class="form-control"></div>
            </div>
            <div class="row g-3 mb-4 text-center">
              <div class="col-4"><label class="small">ต้นทุน</label><input type="number" id="o_cost" class="form-control text-danger fw-bold" value="0"></div>
              <div class="col-4"><label class="small">ราคาขาย</label><input type="number" id="o_price" class="form-control text-success fw-bold" value="0"></div>
              <div class="col-4"><label class="small">จำนวน</label><input type="number" id="o_qty" class="form-control" value="1"></div>
            </div>
            <div class="row g-3 mb-5">
                <div class="col-6"><label class="small">ค่าส่ง</label><input type="number" id="o_ship" class="form-control" value="0"></div>
                <div class="col-6"><label class="small">ส่วนลด</label><input type="number" id="o_disc" class="form-control" value="0"></div>
            </div>
            <button class="btn btn-success w-100 py-3 rounded-4 fw-bold shadow-lg" id="submitBtn" onclick="submitAll()">💾 บันทึกรายการทั้งหมด</button>
          </div>
        </div>
      </div>
    </div>

    <div id="biSection" style="display:none;">
      <div class="row g-3 mb-4">
        <div class="col-md-2 col-6"><div class="report-card border-start border-success border-4"><span class="kpi-label">วันนี้</span><div class="kpi-val text-success" id="kToday">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card border-start border-primary border-4"><span class="kpi-label">เดือนนี้</span><div class="kpi-val" id="kMonth">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card border-start border-info border-4"><span class="kpi-label">ปีนี้</span><div class="kpi-val" id="kYear">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="kpi-label">ยอดสะสมทั้งหมด</span><div class="kpi-val" id="kTotal">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="kpi-label">กำไรรวม</span><div class="kpi-val text-success" id="kProfit">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="kpi-label">ลูกค้าทั้งหมด</span><div class="kpi-val" id="kCust">0</div></div></div>
      </div>
      <div class="row g-4">
        <div class="col-lg-8"><div class="report-card"><h6>วิเคราะห์ยอดขายรายวัน (OHLC)</h6><div style="height: 380px;"><canvas id="candleChart"></canvas></div></div></div>
        <div class="col-lg-4"><div class="report-card text-center"><h6>สัดส่วนสินค้า 5 อันดับแรก</h6><div style="height: 250px;"><canvas id="itemChart"></canvas></div><div id="itemLegend" class="mt-3 text-start"></div></div></div>
      </div>
    </div>
  </div>
</div>

<script>
  // 🌟 [สำคัญ] ใส่ API URL ของคุณที่นี่
  const API_URL = "https://script.google.com/macros/s/AKfycbws5q-vuIrKCcccLXTlTz--FQCli4knASaafgkH43NA212vj1kBde3bA8H--KE_DuHh_A/exec";
  
  let candleChart = null, iChart = null;

  async function callAPI(action, data = null, query = null) {
    document.getElementById('loader').style.display = 'flex';
    try {
      const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, data, query }) });
      const res = await response.json();
      document.getElementById('loader').style.display = 'none';
      return res;
    } catch (e) { document.getElementById('loader').style.display = 'none'; return null; }
  }

  async function login() {
    const res = await callAPI("login", { pass: document.getElementById('passInput').value });
    if (res && res.success) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainPage').style.display = 'block';
      document.getElementById('c_id').value = res.nextIds.custId;
      document.getElementById('o_id').value = res.nextIds.orderId;
      document.getElementById('o_date').value = new Date().toISOString().split('T')[0];
    } else { Swal.fire('Error', 'รหัสผ่านผิด', 'error'); }
  }

  function switchTab(tab) {
    document.getElementById('posSection').style.display = (tab === 'pos') ? 'block' : 'none';
    document.getElementById('biSection').style.display = (tab === 'bi') ? 'block' : 'none';
    document.getElementById('pos-tab').classList.toggle('active', tab === 'pos');
    document.getElementById('bi-tab').classList.toggle('active', tab === 'bi');
    if (tab === 'bi') loadBI();
  }

  async function loadBI() {
    const data = await callAPI("getDashboard");
    if (!data || data.error) return;

    // อัปเดตตัวเลข 6 ช่อง
    document.getElementById('kToday').innerText = '฿' + data.kpi.todaySales.toLocaleString();
    document.getElementById('kMonth').innerText = '฿' + data.kpi.monthSales.toLocaleString();
    document.getElementById('kYear').innerText = '฿' + data.kpi.yearSales.toLocaleString();
    document.getElementById('kTotal').innerText = '฿' + data.kpi.totalSales.toLocaleString();
    document.getElementById('kProfit').innerText = '฿' + data.kpi.totalProfit.toLocaleString();
    document.getElementById('kCust').innerText = data.kpi.customerCount.toLocaleString();

    // Render กราฟแท่งเทียน
    const ctxC = document.getElementById('candleChart').getContext('2d');
    if(candleChart) candleChart.destroy();
    candleChart = new Chart(ctxC, {
      type: 'candlestick',
      data: { datasets: [{ label: 'Daily Sales', data: data.chartData, color: { up: '#10b981', down: '#ef4444' } }] },
      options: { responsive: true, maintainAspectRatio: false }
    });

    // Render กราฟวงกลม
    const ctxP = document.getElementById('itemChart').getContext('2d');
    if(iChart) iChart.destroy();
    iChart = new Chart(ctxP, {
      type: 'doughnut',
      data: { 
        labels: data.itemSummary.map(i => i.name),
        datasets: [{ data: data.itemSummary.map(i => i.value), backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] }]
      },
      options: { cutout: '70%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
    
    document.getElementById('itemLegend').innerHTML = data.itemSummary.map((i, idx) => `
      <div class="d-flex justify-content-between small mb-1">
        <span><span style="color:${iChart.data.datasets[0].backgroundColor[idx]}">●</span> ${i.name}</span>
        <b>฿${i.value.toLocaleString()}</b>
      </div>`).join('');
  }

  // --- ฟังก์ชัน POS พื้นฐาน ---
  async function searchCust() {
      const q = document.getElementById('searchInput').value;
      const res = await callAPI("search", null, q);
      if(res) {
          document.getElementById('c_id').value = res.id;
          document.getElementById('c_name').value = res.name;
          document.getElementById('c_phone').value = res.phone;
          document.getElementById('c_address').value = res.address;
          document.getElementById('c_last_date').value = res.lastDate;
      } else { Swal.fire('ไม่พบข้อมูล', 'ไม่พบชื่อหรือเบอร์นี้', 'warning'); }
  }

  async function submitAll() {
      const data = {
          id: document.getElementById('c_id').value, name: document.getElementById('c_name').value, phone: document.getElementById('c_phone').value, address: document.getElementById('c_address').value,
          orderDate: document.getElementById('o_date').value, orderId: document.getElementById('o_id').value, item: document.getElementById('o_item').value,
          cost: Number(document.getElementById('o_cost').value), price: Number(document.getElementById('o_price').value), qty: Number(document.getElementById('o_qty').value), shipping: Number(document.getElementById('o_ship').value), discount: Number(document.getElementById('o_disc').value)
      };
      if(!data.name || !data.orderId) return Swal.fire('เตือน', 'กรุณาระบุชื่อและออเดอร์', 'warning');
      const res = await callAPI("save", data);
      if(res && res.success) {
          Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', timer: 1500, showConfirmButton: false });
          clearFormSilent();
      }
  }

  async function clearFormSilent() {
      document.querySelectorAll('input:not([readonly])').forEach(i => i.value = "");
      document.getElementById('c_address').value = "";
      document.getElementById('o_date').value = new Date().toISOString().split('T')[0];
      const next = await callAPI("getNextIds");
      if(next) { document.getElementById('c_id').value = next.custId; document.getElementById('o_id').value = next.orderId; }
  }

  function manualClear() { clearFormSilent(); Swal.fire({ icon: 'info', title: 'ล้างข้อมูลแล้ว', timer: 800, showConfirmButton: false }); }
</script>
</body>
</html>
