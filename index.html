<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CH-MANAGEMENT PREMIUM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --primary: #4f46e5; --border: #e2e8f0; }
    body.dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; }
    body { font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; }
    
    .nav-tabs { background: var(--card); padding: 10px 20px; border-bottom: 1px solid var(--border); }
    .nav-link { border: none !important; color: #94a3b8; font-weight: 600; cursor: pointer; border-radius: 12px !important; margin-right: 8px; }
    .nav-link.active { background: var(--primary) !important; color: white !important; }

    .report-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); height: 100%; }
    .kpi-val { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    
    #loginPage { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .login-card { background: var(--card); border-radius: 30px; padding: 3rem; width: 400px; text-align: center; }
    
    .filter-box { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
    .btn-filter { border-radius: 10px; font-size: 0.85rem; padding: 6px 15px; }
    #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; }
  </style>
</head>
<body onload="initApp()">

<div id="loader"><div class="spinner-border text-primary"></div></div>

<div id="loginPage">
  <div class="login-card shadow-lg">
    <img src="https://i.postimg.cc/jjFG7ZmX/463627704-946416417505448-1269396498497011830-n.jpg" class="rounded-circle mb-4" width="100">
    <h3 class="fw-bold">ยินดีต้อนรับ</h3>
    <p class="text-muted small">ระบุรหัสผ่านเพื่อเข้าสู่ระบบ</p>
    <input type="password" id="passInput" class="form-control text-center mb-4 py-3" placeholder="••••" maxlength="4" style="font-size: 2.5rem; letter-spacing: 15px; border-radius: 15px;" autocomplete="off">
    <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="login()">เข้าสู่ระบบ</button>
  </div>
</div>

<div id="mainPage" style="display:none;">
  <ul class="nav nav-tabs sticky-top shadow-sm">
    <li class="nav-item"><a class="nav-link active" onclick="switchTab('pos')">บันทึกยอด</a></li>
    <li class="nav-item"><a class="nav-link" onclick="switchTab('bi')">สรุปยอด (BI)</a></li>
    <li class="ms-auto d-flex align-items-center gap-2">
      <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
      <button onclick="location.reload()" class="btn btn-danger btn-sm rounded-pill px-3">ออก</button>
    </li>
  </ul>

  <div class="container-fluid p-4">
    <div id="biSection" style="display:none;">
      <div class="filter-box shadow-sm">
        <div class="fw-bold text-primary"><i class="fa-solid fa-filter me-2"></i>เลือกช่วงเวลา:</div>
        <div class="btn-group">
          <button class="btn btn-outline-primary btn-filter active" id="btnAll" onclick="setFilter('all')">ทั้งหมด</button>
          <button class="btn btn-outline-primary btn-filter" id="btnDay" onclick="setFilter('day')">รายวัน</button>
          <button class="btn btn-outline-primary btn-filter" id="btnMonth" onclick="setFilter('month')">รายเดือน</button>
          <button class="btn btn-outline-primary btn-filter" id="btnYear" onclick="setFilter('year')">รายปี</button>
        </div>
        <div id="filterInputs" class="d-flex gap-2"></div>
        <button class="btn btn-dark btn-sm rounded-pill px-4" onclick="applyFilter()">แสดงผล</button>
      </div>

      <div class="row g-3 mb-4 text-center">
        <div class="col-md-2 col-6"><div class="report-card"><span class="small text-muted">วันนี้</span><div class="kpi-val text-success" id="kToday">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="small text-muted">เดือนนี้</span><div class="kpi-val" id="kMonth">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="small text-muted">ปีนี้</span><div class="kpi-val" id="kYear">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="small text-muted">ยอดขายรวม</span><div class="kpi-val" id="kTotal">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="small text-muted">กำไรรวม</span><div class="kpi-val text-success" id="kProfit">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="small text-muted">ลูกค้า</span><div class="kpi-val" id="kCust">0</div></div></div>
      </div>

      <div class="row g-4">
        <div class="col-lg-8"><div class="report-card"><h6>แผนภูมิยอดขาย (Column Chart)</h6><div style="height: 400px;"><canvas id="mainChart"></canvas></div></div></div>
        <div class="col-lg-4"><div class="report-card text-center"><h6>สินค้าขายดี</h6><div style="height: 250px;"><canvas id="itemChart"></canvas></div><div id="itemLegend" class="mt-4 text-start small"></div></div></div>
      </div>
    </div>

    <div id="posSection">
      <div class="report-card">
         <p>หน้าบันทึกยอดพร้อมใช้งาน (คีย์ข้อมูลลูกค้าและสินค้าได้ปกติ)</p>
      </div>
    </div>
  </div>
</div>

<script>
  // 🌟 ใส่ URL เว็บแอปใหม่ที่คุณ Deploy จาก Code.gs ที่นี่
  const API_URL = "https://script.google.com/macros/s/AKfycbw1beb31MFcicD4xn3zPjuXrRJdfbqx-soc3AYBAfdJ_a7kq8PeTOAXYchGzF5EFnuabQ/exec"; 
  
  let mainChart, itemChart, fullData, currentFilter = 'all';

  function initApp() {
    document.getElementById('passInput').value = ''; // 🟢 ล้างช่องรหัสทันที
  }

  async function callAPI(action, data = null, query = null) {
    document.getElementById('loader').style.display = 'flex';
    try {
      const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, data, query }) });
      const res = await response.json();
      document.getElementById('loader').style.display = 'none';
      return res;
    } catch (e) { document.getElementById('loader').style.display = 'none'; return null; }
  }

  async function login() {
    const res = await callAPI("login", { pass: document.getElementById('passInput').value });
    if (res && res.success) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainPage').style.display = 'block';
    } else { Swal.fire('Error', 'รหัสผ่านผิด', 'error'); document.getElementById('passInput').value = ''; }
  }

  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    document.getElementById('themeIcon').className = document.body.classList.contains('dark-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }

  function setFilter(type) {
    currentFilter = type;
    document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
    document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
    
    const box = document.getElementById('filterInputs');
    if (type === 'all') box.innerHTML = '';
    else if (type === 'day') box.innerHTML = '<input type="date" id="valD" class="form-control form-control-sm">';
    else if (type === 'month') box.innerHTML = '<input type="month" id="valM" class="form-control form-control-sm">';
    else if (type === 'year') box.innerHTML = '<input type="number" id="valY" class="form-control form-control-sm" value="2026">';
  }

  function applyFilter() {
    let filtered = fullData.transactions;
    if (currentFilter === 'day') {
      const val = document.getElementById('valD').value;
      if(val) filtered = filtered.filter(t => t.date === val);
    } else if (currentFilter === 'month') {
      const val = document.getElementById('valM').value;
      if(val) filtered = filtered.filter(t => t.month === val);
    } else if (currentFilter === 'year') {
      const val = document.getElementById('valY').value;
      if(val) filtered = filtered.filter(t => t.year === val.toString());
    }
    renderMainChart(filtered);
  }

  async function loadBI() {
    fullData = await callAPI("getDashboard");
    if (!fullData) return;
    updateKPIs(fullData.kpi);
    setFilter('all');
    renderMainChart(fullData.transactions);
    renderItemChart(fullData.itemSummary);
  }

  function renderMainChart(transactions) {
    let daily = {};
    transactions.forEach(t => { daily[t.date] = (daily[t.date] || 0) + t.amount; });
    const labels = Object.keys(daily).sort();
    const values = labels.map(l => daily[l]);

    const ctx = document.getElementById('mainChart').getContext('2d');
    if(mainChart) mainChart.destroy();
    
    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, '#4f46e5');
    gradient.addColorStop(1, '#a855f7');

    mainChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: labels, datasets: [{ label: 'ยอดขาย', data: values, backgroundColor: gradient, borderRadius: 8 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }

  function renderItemChart(iData) {
    const ctx = document.getElementById('itemChart').getContext('2d');
    if(itemChart) itemChart.destroy();
    itemChart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels: iData.map(i => i.name), datasets: [{ data: iData.map(i => i.value), backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'], borderWidth: 0 }] },
      options: { cutout: '75%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
    document.getElementById('itemLegend').innerHTML = iData.map((i, idx) => `<div>● ${i.name}: ฿${i.value.toLocaleString()}</div>`).join('');
  }

  function updateKPIs(kpi) {
    document.getElementById('kToday').innerText = '฿' + kpi.today.toLocaleString();
    document.getElementById('kMonth').innerText = '฿' + kpi.month.toLocaleString();
    document.getElementById('kYear').innerText = '฿' + kpi.year.toLocaleString();
    document.getElementById('kTotal').innerText = '฿' + kpi.sales.toLocaleString();
    document.getElementById('kProfit').innerText = '฿' + kpi.profit.toLocaleString();
    document.getElementById('kCust').innerText = kpi.custCount.toLocaleString();
  }

  function switchTab(tab) {
    document.getElementById('posSection').style.display = (tab === 'pos') ? 'block' : 'none';
    document.getElementById('biSection').style.display = (tab === 'bi') ? 'block' : 'none';
    if (tab === 'bi') loadBI();
  }
</script>
</body>
</html>
