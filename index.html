<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CH Management System</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <script src="https://www.chartjs.org/chartjs-chart-financial/chartjs-chart-financial.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root { --primary: #4f46e5; --dark: #0f172a; --soft-bg: #f8fafc; --card: #ffffff; }
    body.dark-mode { --soft-bg: #0f172a; --card: #1e293b; color: #f8fafc; }
    body { font-family: 'Kanit', sans-serif; background-color: var(--soft-bg); transition: 0.3s; margin: 0; }
    
    .nav-tabs { background: white; padding: 10px 25px; border-bottom: 1px solid #e2e8f0; sticky: top; z-index: 1000; }
    .nav-link { border: none !important; color: #64748b; font-weight: 600; border-radius: 12px !important; margin-right: 10px; }
    .nav-link.active { background: var(--primary) !important; color: white !important; }

    .report-card { background: var(--card); border: 1px solid #e2e8f0; border-radius: 18px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); height: 100%; }
    .kpi-val { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .cust-card { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; border-radius: 25px; padding: 25px; border: none; }
    .cust-card .form-control { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; }
    
    #loginPage { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; }
  </style>
</head>
<body>

<div id="loader"><div class="spinner-border text-primary"></div></div>

<div id="loginPage">
  <div class="card p-4 shadow-lg text-center" style="width: 380px; border-radius: 24px;">
    <img src="https://i.postimg.cc/jjFG7ZmX/463627704-946416417505448-1269396498497011830-n.jpg" class="rounded-circle mx-auto mb-3" width="90">
    <h4 class="fw-bold">เข้าสู่ระบบจัดการ</h4>
    <input type="password" id="passInput" class="form-control text-center my-4 py-3" placeholder="••••" maxlength="4" style="font-size: 2rem; letter-spacing: 10px;" onkeypress="if(event.key==='Enter')login()">
    <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="login()">ตกลง</button>
  </div>
</div>

<div id="mainPage" style="display:none;">
  <ul class="nav nav-tabs shadow-sm sticky-top">
    <li class="nav-item"><a class="nav-link active" href="#" onclick="switchTab('pos', event)"><i class="fa-solid fa-cash-register me-2"></i>บันทึกยอด</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('bi', event)"><i class="fa-solid fa-chart-pie me-2"></i>สรุปยอด (BI)</a></li>
    <li class="ms-auto d-flex gap-2">
      <button onclick="document.body.classList.toggle('dark-mode')" class="btn btn-light rounded-pill px-3 border">🌓</button>
      <button onclick="location.reload()" class="btn btn-danger rounded-pill px-3">ออก</button>
    </li>
  </ul>

  <div class="container-fluid p-4">
    <div id="posSection">
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="cust-card shadow">
            <h5 class="fw-bold mb-4">ข้อมูลลูกค้า</h5>
            <div class="row g-2 mb-3 text-center">
              <div class="col-6"><label class="small">ID</label><input type="text" id="c_id" class="form-control fw-bold text-center" readonly></div>
              <div class="col-6"><label class="small">วันที่สั่งล่าสุด</label><input type="text" id="c_last_date" class="form-control text-center" readonly placeholder="-"></div>
            </div>
            <input type="text" id="c_name" class="form-control mb-3" placeholder="ชื่อลูกค้า">
            <input type="text" id="c_phone" class="form-control mb-3" placeholder="เบอร์โทรศัพท์">
            <textarea id="c_address" class="form-control mb-3" rows="5" placeholder="ที่อยู่ส่งของ"></textarea>
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control bg-light" placeholder="ค้นชื่อ/เบอร์">
                <button class="btn btn-dark" onclick="searchCust()">ค้นหา</button>
            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="report-card">
            <h5 class="fw-bold mb-4 text-primary">บันทึกออเดอร์ใหม่</h5>
            <div class="row g-3 mb-3">
              <div class="col-md-4"><label>วันที่</label><input type="date" id="o_date" class="form-control"></div>
              <div class="col-md-4"><label>เลขที่บิล</label><input type="text" id="o_id" class="form-control bg-light fw-bold" readonly></div>
              <div class="col-md-4"><label>สินค้า</label><input type="text" id="o_item" class="form-control"></div>
            </div>
            <div class="row g-3 mb-3 text-center">
              <div class="col-4"><label>ต้นทุน</label><input type="number" id="o_cost" class="form-control text-danger fw-bold" value="0"></div>
              <div class="col-4"><label>ราคาขาย</label><input type="number" id="o_price" class="form-control text-success fw-bold" value="0"></div>
              <div class="col-4"><label>จำนวน</label><input type="number" id="o_qty" class="form-control" value="1"></div>
            </div>
            <div class="row g-3 mb-4">
              <div class="col-6"><label>ค่าส่ง</label><input type="number" id="o_ship" class="form-control" value="0"></div>
              <div class="col-6"><label>ส่วนลด</label><input type="number" id="o_disc" class="form-control" value="0"></div>
            </div>
            <button class="btn btn-success w-100 py-3 rounded-4 fw-bold shadow-lg" onclick="submitAll()">💾 บันทึกรายการทั้งหมด</button>
          </div>
        </div>
      </div>
    </div>

    <div id="biSection" style="display:none;">
      <div class="row g-3 mb-4">
        <div class="col-md-3 col-6"><div class="report-card border-start border-success border-4"><small class="text-muted">ยอดขายวันนี้</small><div class="kpi-val text-success" id="kToday">฿0</div></div></div>
        <div class="col-md-3 col-6"><div class="report-card"><small class="text-muted">ยอดขายสะสม</small><div class="kpi-val" id="kTotal">฿0</div></div></div>
        <div class="col-md-3 col-6"><div class="report-card"><small class="text-muted">กำไรสุทธิ</small><div class="kpi-val text-success" id="kProfit">฿0</div></div></div>
        <div class="col-md-3 col-6"><div class="report-card"><small class="text-muted">ลูกค้าทั้งหมด</small><div class="kpi-val" id="kCust">0</div></div></div>
      </div>
      <div class="row g-4">
        <div class="col-lg-8"><div class="report-card"><h6 class="fw-bold mb-4">กราฟแท่งเทียนยอดขายรายวัน (OHLC)</h6><div style="height: 380px;"><canvas id="candleChart"></canvas></div></div></div>
        <div class="col-lg-4"><div class="report-card text-center"><h6 class="fw-bold mb-4">สินค้าขายดี 5 อันดับ</h6><div style="height: 250px;"><canvas id="itemChart"></canvas></div><div id="itemLegend" class="mt-3 text-start"></div></div></div>
      </div>
    </div>
  </div>
</div>

<script>
  // 🌟 [สำคัญ] ใส่ API URL ที่ได้จาก Google Apps Script ตรงนี้
  const API_URL = "https://script.google.com/macros/s/AKfycbzU8sD_uKbNUsmccv88vyL3h93U1hYoTSPzjae_VK0iuQloBotvaZUuVHqK1OaGGRvCMQ/exec";

  let candleChart = null, iChart = null;

  async function callAPI(action, data = null, query = null) {
    document.getElementById('loader').style.display = 'flex';
    try {
      const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, data, query }) });
      const res = await response.json();
      document.getElementById('loader').style.display = 'none';
      return res;
    } catch (e) { document.getElementById('loader').style.display = 'none'; return null; }
  }

  async function login() {
    const pass = document.getElementById('passInput').value;
    const res = await callAPI("login", { pass: pass });
    if (res && res.success) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainPage').style.display = 'block';
      document.getElementById('c_id').value = res.nextIds.custId;
      document.getElementById('o_id').value = res.nextIds.orderId;
      document.getElementById('o_date').value = new Date().toISOString().split('T')[0];
    } else { Swal.fire('Error', 'รหัสผ่านไม่ถูกต้อง', 'error'); }
  }

  function switchTab(tab, event) {
    document.getElementById('posSection').style.display = (tab === 'pos') ? 'block' : 'none';
    document.getElementById('biSection').style.display = (tab === 'bi') ? 'block' : 'none';
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    event.currentTarget.classList.add('active');
    if (tab === 'bi') loadDashboard();
  }

  async function loadDashboard() {
    const data = await callAPI("getDashboard");
    if (!data || data.error) return;

    // Update KPI
    document.getElementById('kToday').innerText = '฿' + data.kpi.todaySales.toLocaleString();
    document.getElementById('kTotal').innerText = '฿' + data.kpi.sales.toLocaleString();
    document.getElementById('kProfit').innerText = '฿' + data.kpi.profit.toLocaleString();
    document.getElementById('kCust').innerText = data.kpi.customers.toLocaleString();

    // Chart OHLC
    const ctxC = document.getElementById('candleChart').getContext('2d');
    if(candleChart) candleChart.destroy();
    candleChart = new Chart(ctxC, {
      type: 'candlestick',
      data: { datasets: [{ label: 'Sales OHLC', data: data.chartData, color: { up: '#10b981', down: '#ef4444' } }] },
      options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } } } }
    });

    // Chart Pie
    const ctxP = document.getElementById('itemChart').getContext('2d');
    if(iChart) iChart.destroy();
    iChart = new Chart(ctxP, {
      type: 'doughnut',
      data: { labels: data.itemSummary.map(i => i.name), datasets: [{ data: data.itemSummary.map(i => i.value), backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] }] },
      options: { cutout: '70%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
    
    document.getElementById('itemLegend').innerHTML = data.itemSummary.map((i, idx) => `
      <div class="d-flex justify-content-between small mb-1">
        <span><span style="color:${iChart.data.datasets[0].backgroundColor[idx]}">●</span> ${i.name}</span>
        <b>฿${i.value.toLocaleString()}</b>
      </div>`).join('');
  }

  async function submitAll() {
      const data = {
          id: document.getElementById('c_id').value, name: document.getElementById('c_name').value, phone: document.getElementById('c_phone').value, address: document.getElementById('c_address').value,
          orderDate: document.getElementById('o_date').value, orderId: document.getElementById('o_id').value, item: document.getElementById('o_item').value,
          cost: Number(document.getElementById('o_cost').value), price: Number(document.getElementById('o_price').value), qty: Number(document.getElementById('o_qty').value), shipping: Number(document.getElementById('o_ship').value), discount: Number(document.getElementById('o_disc').value)
      };
      const res = await callAPI("save", data);
      if(res && res.success) {
          Swal.fire('สำเร็จ', 'บันทึกเรียบร้อยและเริ่มคนใหม่', 'success');
          document.getElementById('o_item').value = "";
          document.querySelectorAll('input:not([readonly])').forEach(i => i.value = (i.type === 'number') ? 0 : "");
          document.getElementById('c_address').value = "";
          document.getElementById('o_date').value = new Date().toISOString().split('T')[0];
          const next = await callAPI("getNextIds");
          if(next) { document.getElementById('c_id').value = next.custId; document.getElementById('o_id').value = next.orderId; }
      }
  }

  async function searchCust() {
      const q = document.getElementById('searchInput').value;
      const res = await callAPI("search", null, q);
      if(res) {
          document.getElementById('c_id').value = res.id;
          document.getElementById('c_name').value = res.name;
          document.getElementById('c_phone').value = res.phone;
          document.getElementById('c_address').value = res.address;
          document.getElementById('c_last_date').value = res.lastDate;
          Swal.fire({ title: 'พบลูกค้า', html: `ยอดซื้อสะสม: ฿${res.totalSpent.toLocaleString()}`, icon: 'success' });
      }
  }
</script>
</body>
</html>
