<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CH-MANAGEMENT Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <script src="https://www.chartjs.org/chartjs-chart-financial/chartjs-chart-financial.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root { --primary: #4f46e5; --dark: #0f172a; --soft-bg: #f1f5f9; --card: #ffffff; }
    body { font-family: 'Kanit', sans-serif; background: var(--soft-bg); margin: 0; }
    .nav-tabs { background: #fff; padding: 10px 25px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
    .nav-link { border: none !important; color: #64748b; font-weight: 600; cursor: pointer; border-radius: 12px !important; margin-right: 10px; }
    .nav-link.active { background: var(--primary) !important; color: white !important; }
    .report-card { background: var(--card); border-radius: 18px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); height: 100%; }
    .kpi-label { font-size: 0.7rem; color: #64748b; font-weight: 600; text-transform: uppercase; }
    .kpi-val { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    #loginPage { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; }
  </style>
</head>
<body>

<div id="loader"><div class="spinner-border text-primary"></div></div>

<div id="loginPage">
  <div class="card p-4 text-center shadow-lg" style="width: 380px; border-radius: 24px;">
    <img src="https://i.postimg.cc/jjFG7ZmX/463627704-946416417505448-1269396498497011830-n.jpg" class="rounded-circle mx-auto mb-3" width="90">
    <h4 class="fw-bold">CH-MANAGEMENT</h4>
    <input type="password" id="passInput" class="form-control text-center my-4 py-3" placeholder="••••" maxlength="4" style="font-size: 2rem; letter-spacing: 10px;">
    <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="login()">เข้าสู่ระบบ</button>
  </div>
</div>

<div id="mainPage" style="display:none;">
  <ul class="nav nav-tabs shadow-sm sticky-top">
    <li class="nav-item"><a class="nav-link active" id="pos-tab" onclick="switchTab('pos')"><i class="fa-solid fa-cash-register me-2"></i>บันทึกยอด</a></li>
    <li class="nav-item"><a class="nav-link" id="bi-tab" onclick="switchTab('bi')"><i class="fa-solid fa-chart-line me-2"></i>สรุปยอด (BI)</a></li>
    <li class="ms-auto"><button onclick="location.reload()" class="btn btn-danger btn-sm rounded-pill px-3 mt-1">ออก</button></li>
  </ul>

  <div class="container-fluid p-4">
    <div id="biSection" style="display:none;">
      <div class="row g-3 mb-4">
        <div class="col-md-2 col-6"><div class="report-card border-start border-success border-4"><span class="kpi-label">ยอดขายวันนี้</span><div class="kpi-val text-success" id="kToday">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="kpi-label">เดือนนี้</span><div class="kpi-val" id="kMonth">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="kpi-label">ปีนี้</span><div class="kpi-val" id="kYear">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="kpi-label">ยอดสะสมรวม</span><div class="kpi-val text-primary" id="kTotal">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="kpi-label">กำไรรวม</span><div class="kpi-val text-success" id="kProfit">฿0</div></div></div>
        <div class="col-md-2 col-6"><div class="report-card"><span class="kpi-label">ลูกค้าทั้งหมด</span><div class="kpi-val" id="kCust">0</div></div></div>
      </div>
      <div class="row g-4">
        <div class="col-lg-8"><div class="report-card"><h6>ยอดขายรายวัน (Candlestick)</h6><div style="height: 380px;"><canvas id="candleChart"></canvas></div></div></div>
        <div class="col-lg-4"><div class="report-card text-center"><h6>สินค้าขายดี 5 อันดับ</h6><div style="height: 250px;"><canvas id="itemChart"></canvas></div><div id="itemLegend" class="mt-3 text-start small"></div></div></div>
      </div>
    </div>

    <div id="posSection">
      <div class="alert alert-info">กำลังโหลดหน้าบันทึกยอด...</div>
    </div>
  </div>
</div>

<script>
  // 🌟 [สำคัญที่สุด] ใส่ URL เว็บแอปของคุณที่นี่
  const API_URL = "https://script.google.com/macros/s/AKfycbwK166T1PNA-CvN2tpoQObkuP6sTOu2Ey34mD4GWyjxySe72Bctitn45_vMitIhMUw1HQ/exec";
  
  let candleChart, iChart;

  async function callAPI(action, data = null, query = null) {
    document.getElementById('loader').style.display = 'flex';
    try {
      // 💡 จุดแก้ CORS: ไม่ส่ง Content-TypeHeader เพื่อให้ Browser มองเป็น Simple Request
      const response = await fetch(API_URL, { 
        method: 'POST', 
        body: JSON.stringify({ action, data, query }) 
      });
      const res = await response.json();
      document.getElementById('loader').style.display = 'none';
      return res;
    } catch (e) { 
      document.getElementById('loader').style.display = 'none'; 
      console.error(e);
      return null; 
    }
  }

  async function login() {
    const pass = document.getElementById('passInput').value;
    const res = await callAPI("login", { pass: pass });
    if (res && res.success) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainPage').style.display = 'block';
      // โหลด ID อัตโนมัติ
      document.getElementById('c_id').value = res.nextIds.custId;
      document.getElementById('o_id').value = res.nextIds.orderId;
      document.getElementById('o_date').value = new Date().toISOString().split('T')[0];
    } else { 
      Swal.fire('Error', 'รหัสผ่านผิด หรือ ระบบขัดข้อง', 'error'); 
    }
  }

  function switchTab(tab) {
    document.getElementById('posSection').style.display = (tab === 'pos') ? 'block' : 'none';
    document.getElementById('biSection').style.display = (tab === 'bi') ? 'block' : 'none';
    document.getElementById('pos-tab').classList.toggle('active', tab === 'pos');
    document.getElementById('bi-tab').classList.toggle('active', tab === 'bi');
    if (tab === 'bi') loadBI();
  }

  async function loadBI() {
    const data = await callAPI("getDashboard");
    if (!data || data.error) return;

    // อัปเดตตัวเลข 6 ช่อง
    document.getElementById('kToday').innerText = '฿' + data.kpi.today.toLocaleString();
    document.getElementById('kMonth').innerText = '฿' + data.kpi.month.toLocaleString();
    document.getElementById('kYear').innerText = '฿' + data.kpi.year.toLocaleString();
    document.getElementById('kTotal').innerText = '฿' + data.kpi.sales.toLocaleString();
    document.getElementById('kProfit').innerText = '฿' + data.kpi.profit.toLocaleString();
    document.getElementById('kCust').innerText = data.kpi.custCount.toLocaleString();

    // กราฟแท่งเทียน
    const ctxC = document.getElementById('candleChart').getContext('2d');
    if(candleChart) candleChart.destroy();
    candleChart = new Chart(ctxC, {
      type: 'candlestick',
      data: { datasets: [{ label: 'Daily Sales', data: data.chartData, color: { up: '#10b981', down: '#ef4444' } }] },
      options: { responsive: true, maintainAspectRatio: false }
    });

    // กราฟสัดส่วน
    const ctxP = document.getElementById('itemChart').getContext('2d');
    if(iChart) iChart.destroy();
    iChart = new Chart(ctxP, {
      type: 'doughnut',
      data: { labels: data.itemSummary.map(i => i.name), datasets: [{ data: data.itemSummary.map(i => i.value), backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] }] },
      options: { cutout: '75%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
    document.getElementById('itemLegend').innerHTML = data.itemSummary.map((i, idx) => `<div>● ${i.name}: ฿${i.value.toLocaleString()}</div>`).join('');
  }
</script>
</body>
</html>
